# Pull request validation.
# Runs the shared build-and-test workflow without deploying.

name: PR

on:
  pull_request:
    branches: [main]
    types: [synchronize, opened, reopened, ready_for_review]
    paths-ignore:
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - ".husky/**"
      - ".prettierignore"
      - ".snyk"
      - ".vscode/**"
      - "**.md"
      - "LICENSE"

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    uses: ./.github/workflows/build.yml
    if: github.event.pull_request.draft == false
    # "pull-requests: write" (used by the coverage comment step)
    # must be granted here too.
    permissions:
      contents: read
      pull-requests: write
    # Snyk + Codecov needed for scanning and publishing codecov.
    # Cloudflare tokens are scoped to deploy jobs.
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
