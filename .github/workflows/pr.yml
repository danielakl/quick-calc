# Pull request validation.
# Runs the shared build-and-test workflow without deploying.

name: PR

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - ".husky/**"
      - ".prettierignore"
      - ".snyk"
      - ".vscode/**"
      - "**.md"
      - "LICENSE"

jobs:
  build-and-test:
    uses: ./.github/workflows/build.yml
    secrets: inherit
