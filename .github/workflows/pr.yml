# Pull request validation.
# Runs the shared build-and-test workflow without deploying.

name: PR

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - ".husky/**"
      - ".prettierignore"
      - ".snyk"
      - ".vscode/**"
      - "**.md"
      - "LICENSE"

jobs:
  build-and-test:
    uses: ./.github/workflows/build.yml
    # Pass only the secrets the build job actually needs. Cloudflare/release
    # tokens are never required for PR validation and stay out of PR runs.
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
