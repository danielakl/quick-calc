# Reusable build-and-test workflow.
# Called by ci.yml (push to main) and pr.yml (pull requests).
# Runs linting, type-checking, unit tests, E2E tests, security scans,
# and optionally uploads the build artifact for downstream deploy jobs.

name: Build

on:
  workflow_call:
    inputs:
      upload-artifact:
        description: "Upload build output as artifact for downstream jobs"
        type: boolean
        default: false

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: ".node-version"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=high

      # Snyk Open Source (SCA) — complements pnpm audit with Snyk's curated vuln DB
      - name: Snyk Open Source scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --severity-threshold=high --all-projects

      # Snyk Code (SAST) — scans src/ for code-level vulnerabilities
      - name: Snyk Code scan
        uses: snyk/actions/node@master
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          command: code test
          args: --severity-threshold=high

      - name: Lint (ESLint)
        run: pnpm run lint

      - name: Typecheck (tsc)
        run: pnpm run typecheck

      - name: Unit tests (Vitest)
        run: pnpm run test:coverage

      # Coverage steps use `if: always()` so reports are uploaded even when
      # tests fail — this keeps the coverage history complete for trend tracking.
      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage/coverage-final.json
          fail_ci_if_error: false

      - name: Coverage summary (PR comment)
        if: always()
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          json-summary-path: coverage/coverage-summary.json
          json-final-path: coverage/coverage-final.json

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: E2E tests (Playwright)
        run: pnpm run test:e2e

      - name: Build (Next.js static export)
        run: pnpm run build

      - name: Upload build artifact
        if: inputs.upload-artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-output
          path: out/
          retention-days: 1
