# Main CI/CD pipeline for pushes to main.
# Flow: build & test → deploy to dev → deploy to prod → tag & release.
# The Production environment gate requires manual approval before prod deploy.

name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - ".editorconfig"
      - ".gitattributes"
      - ".gitignore"
      - ".husky/**"
      - ".prettierignore"
      - ".vscode/**"
      - "**.md"
      - "LICENSE"

jobs:
  build-and-test:
    uses: ./.github/workflows/build.yml
    with:
      upload-artifact: true
    # "pull-requests: write" (used by the coverage comment step)
    # must be granted here too.
    permissions:
      contents: read
      pull-requests: write
    # Snyk + Codecov needed for scanning and publishing codecov.
    # Cloudflare tokens are scoped to deploy jobs.
    secrets:
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  deploy-dev:
    name: Deploy to Development
    needs: build-and-test
    runs-on: ubuntu-latest
    environment: Development
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Deploy to Cloudflare Pages (dev)
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=quick-calc --branch=dev

  deploy-prod:
    name: Deploy to Production
    needs: deploy-dev
    runs-on: ubuntu-latest
    # The Production environment can be configured with protection rules
    # (e.g. required reviewers) to gate production deployments.
    environment: Production
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: build-output
          path: out/

      - name: Deploy to Cloudflare Pages (prod)
        uses: cloudflare/wrangler-action@9acf94ace14e7dc412b076f2c5c20b8ce93c79cd # v3.15.0
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy out --project-name=quick-calc --branch=main

  tag-release:
    name: Tag and release
    needs: deploy-prod
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Create tag and GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="$(date -u +%Y.%m.%d.%H%M%S)"
          git tag "$TAG"
          git push origin "$TAG"
          gh release create "$TAG" --title "$TAG" --generate-notes
